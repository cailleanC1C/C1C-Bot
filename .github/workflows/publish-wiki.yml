name: Publish Wiki

on:
  push:
    branches: [main]
    paths:
      - docs/wiki/**
      - .github/workflows/publish-wiki.yml
      - .github/scripts/validate_wiki.py
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate wiki source
        run: python .github/scripts/validate_wiki.py

      - name: Clone wiki
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/cailleanC1C/C1C-Bot.wiki.git" wiki-checkout

      - name: Replace, commit, and publish wiki
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          find wiki-checkout -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a docs/wiki/. wiki-checkout/
          cd wiki-checkout
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          if git diff --cached --quiet; then
            echo "Wiki is already current."
            exit 0
          fi
          git commit -m "docs: publish wiki from main"
          git push origin HEAD:master
